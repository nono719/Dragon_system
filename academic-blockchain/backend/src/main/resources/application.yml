server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: academic-blockchain-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/academic_blockchain?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.cuit.academic.entity
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# 文件上传保存目录（绝对路径或相对路径都可以）
storage:
  upload-dir: ../uploads

# 区块链相关配置
blockchain:
  rpc-url: http://127.0.0.1:8545
  chain-id: 31337
  # 后端用于代发交易的账户私钥（仅用于本地开发；生产环境应通过环境变量或密钥管理服务）
  # 这里使用 Hardhat 默认 account[0] 的私钥（公开众所周知，仅供测试）
  private-key: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
  contracts:
    # 这些地址在 hardhat 部署后写入；deploy.js 会输出
    record-registry: 0x5FbDB2315678afecb367f032d93F642f64180aa3
    access-control-manager: 0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
  gas-price: 20000000000   # 20 gwei
  gas-limit: 6721975

# JWT
jwt:
  secret: change_me_to_a_long_random_secret_key_at_least_32_chars_aaaaaaaaa
  expiration-hours: 24

logging:
  level:
    com.cuit.academic: DEBUG
    org.web3j: INFO
